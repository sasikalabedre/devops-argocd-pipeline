apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: flask-app
        image: 939169264693.dkr.ecr.ap-southeast-2.amazonaws.com/flask-argocd-app:v1.0
        ports:
        - containerPort: 5000